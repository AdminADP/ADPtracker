<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Athlete Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --surface3: #252532;
  --border: rgba(255,255,255,0.07);
  --accent: #c8ff00;
  --accent2: #00d4ff;
  --accent3: #ff6b35;
  --text: #f0f0f0;
  --muted: #888;
  --danger: #ff4d4d;
  --success: #00e676;
  --r: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; overflow-x: hidden; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

/* ── App Shell ── */
#app { min-height: 100vh; display: flex; flex-direction: column; }

/* ── Auth Screen ── */
#auth-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; min-height: 100vh; background: var(--bg); }
.auth-logo { font-family: 'Bebas Neue', cursive; font-size: 52px; color: var(--accent); letter-spacing: 3px; line-height: 1; margin-bottom: 6px; }
.auth-sub { color: var(--muted); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; width: 100%; max-width: 380px; }
.auth-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.field input, .field select, .field textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color .2s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 80px; }
.field select option { background: var(--surface2); }
.btn { width: 100%; padding: 14px; border-radius: var(--r); border: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-primary { background: var(--accent); color: #0a0a0f; }
.btn-primary:active { opacity: 0.85; transform: scale(0.98); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); margin-top: 10px; }
.btn-ghost:active { background: var(--surface2); }
.btn-danger { background: var(--danger); color: #fff; }
.auth-switch { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
.auth-switch span { color: var(--accent); cursor: pointer; font-weight: 500; }
.role-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.role-tab { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; text-align: center; }
.role-tab.active { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }

/* ── Main Layout ── */
#main-screen { flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ── Top Bar ── */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border); }
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-logo { font-family: 'Bebas Neue', cursive; font-size: 24px; color: var(--accent); letter-spacing: 2px; }
.topbar-athlete { font-size: 13px; color: var(--muted); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); color: #0a0a0f; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.parent-badge { font-size: 10px; background: var(--accent2); color: #0a0a0f; padding: 3px 8px; border-radius: 20px; font-weight: 600; letter-spacing: .5px; }

/* ── Week Selector ── */
.week-bar { display: flex; align-items: center; gap: 10px; padding: 10px 20px; overflow-x: auto; scrollbar-width: none; }
.week-bar::-webkit-scrollbar { display: none; }
.week-chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); font-size: 12px; color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap; }
.week-chip.active { background: var(--accent); color: #0a0a0f; border-color: var(--accent); font-weight: 600; }

/* ── Tabs ── */
.tabs { display: flex; padding: 0 20px; gap: 6px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 12px 14px 10px; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Content Area ── */
.content { flex: 1; padding: 20px; padding-bottom: 100px; overflow-y: auto; }

/* ── Section Header ── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-family: 'Bebas Neue', cursive; font-size: 28px; letter-spacing: 2px; }
.btn-add { background: var(--accent); color: #0a0a0f; border: none; border-radius: 10px; padding: 8px 16px; font-weight: 700; font-size: 13px; cursor: pointer; transition: all .15s; font-family: 'DM Sans', sans-serif; }
.btn-add:active { opacity: 0.85; transform: scale(0.97); }

/* ── Cards ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; position: relative; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.card-title { font-weight: 600; font-size: 15px; }
.card-meta { font-size: 12px; color: var(--muted); }
.card-body { font-size: 14px; color: var(--muted); line-height: 1.6; }
.card-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn-small { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s; }
.btn-small:active { background: var(--surface2); }
.btn-small.del { color: var(--danger); border-color: var(--danger); }

/* ── Tags / Badges ── */
.tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-right: 6px; margin-bottom: 4px; }
.tag-green { background: rgba(0,230,118,0.12); color: var(--success); }
.tag-blue { background: rgba(0,212,255,0.12); color: var(--accent2); }
.tag-orange { background: rgba(255,107,53,0.12); color: var(--accent3); }
.tag-yellow { background: rgba(200,255,0,0.12); color: var(--accent); }

/* ── Stats Row ── */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 10px; text-align: center; }
.stat-num { font-family: 'Bebas Neue', cursive; font-size: 32px; color: var(--accent); line-height: 1; }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

/* ── Progress Bar ── */
.progress-wrap { margin: 8px 0; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.progress-bar { height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s ease; }

/* ── Modal / Drawer ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.drawer { background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; animation: slideUp .25s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.drawer-handle { width: 40px; height: 4px; background: var(--surface3); border-radius: 2px; margin: 0 auto 20px; }
.drawer-title { font-family: 'Bebas Neue', cursive; font-size: 26px; letter-spacing: 2px; margin-bottom: 20px; }

/* ── Parent View Select ── */
.athlete-select-bar { display: flex; gap: 8px; padding: 12px 20px; overflow-x: auto; scrollbar-width: none; background: var(--surface); border-bottom: 1px solid var(--border); }
.athlete-select-bar::-webkit-scrollbar { display: none; }
.athlete-btn { flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; transition: all .15s; }
.athlete-btn.active { border-color: var(--accent2); background: rgba(0,212,255,0.1); }
.athlete-btn .av { width: 24px; height: 24px; border-radius: 50%; background: var(--accent2); color: #0a0a0f; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.athlete-btn span { font-size: 13px; font-weight: 500; color: var(--text); }

/* ── Empty State ── */
.empty { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty h3 { font-size: 16px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
.empty p { font-size: 13px; }

/* ── Nutrition Grid ── */
.nutrition-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.nutrition-grid .card { margin-bottom: 0; }

/* ── Schedule Timeline ── */
.timeline { position: relative; padding-left: 28px; }
.timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: var(--surface3); }
.timeline-item { position: relative; margin-bottom: 16px; }
.timeline-dot { position: absolute; left: -24px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
.timeline-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); margin-bottom: 2px; }
.timeline-event { font-size: 14px; font-weight: 500; }
.timeline-note { font-size: 12px; color: var(--muted); }

/* ── Logout Menu ── */
.profile-menu { position: absolute; top: 58px; right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 8px; min-width: 180px; z-index: 200; display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.profile-menu.open { display: block; }
.profile-menu-item { padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background .15s; display: flex; align-items: center; gap: 10px; }
.profile-menu-item:hover { background: var(--surface2); }
.profile-menu-item.danger { color: var(--danger); }
.divider { height: 1px; background: var(--border); margin: 4px 0; }

/* ── Notification Toast ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #0a0a0f; padding: 12px 24px; border-radius: 30px; font-weight: 600; font-size: 14px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* ── Manage Athletes (Admin) ── */
.manage-section { margin-bottom: 24px; }
.manage-section h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; }

/* ── Hidden ── */
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="app">

<!-- ═══════════════════════════════ AUTH SCREEN ═══════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-logo">ATHLETE<br>TRACKER</div>
  <div class="auth-sub">Performance Dashboard</div>

  <div class="auth-card">
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('athlete')">Athlete</button>
      <button class="role-tab" onclick="setRole('parent')">Parent View</button>
      <button class="role-tab" onclick="setRole('admin')">Admin</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <h2 id="login-title">Sign In</h2>
      <div class="field">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="field">
        <label>PIN (4 digits)</label>
        <input type="password" id="login-pin" placeholder="••••" maxlength="4" inputmode="numeric">
      </div>
      <button class="btn btn-primary" onclick="login()">Sign In</button>
      <div id="login-error" style="color:var(--danger);font-size:13px;text-align:center;margin-top:10px;display:none;"></div>
    </div>

    <!-- Register Form (admin creates athletes) -->
    <div id="register-form" class="hidden">
      <h2>Create Athlete Account</h2>
      <div class="field">
        <label>Athlete Name</label>
        <input type="text" id="reg-name" placeholder="Full name">
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="Choose a username">
      </div>
      <div class="field">
        <label>PIN (4 digits)</label>
        <input type="password" id="reg-pin" placeholder="••••" maxlength="4" inputmode="numeric">
      </div>
      <div class="field">
        <label>Sport</label>
        <input type="text" id="reg-sport" placeholder="e.g. Basketball, Soccer">
      </div>
      <div class="field">
        <label>Position / Role</label>
        <input type="text" id="reg-position" placeholder="e.g. Point Guard">
      </div>
      <button class="btn btn-primary" onclick="registerAthlete()">Create Account</button>
      <button class="btn btn-ghost" onclick="showLogin()">Back to Login</button>
    </div>
  </div>

  <div class="auth-switch" id="auth-switch-link">
    Admin? <span onclick="showRegister()">Set up athlete accounts</span>
  </div>
</div>

<!-- ═══════════════════════════════ MAIN SCREEN ═══════════════════════════════ -->
<div id="main-screen" class="hidden">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">AT</div>
      <div>
        <div style="font-weight:600;font-size:14px;" id="topbar-name">Athlete</div>
        <div class="topbar-athlete" id="topbar-sport">—</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="parent-badge hidden" id="parent-badge">PARENT VIEW</span>
      <div class="avatar" id="user-avatar" onclick="toggleProfileMenu()">A</div>
    </div>
  </div>

  <!-- Profile Menu -->
  <div class="profile-menu" id="profile-menu">
    <div class="profile-menu-item" id="profile-info" style="flex-direction:column;align-items:flex-start;gap:2px;">
      <span style="font-weight:600;font-size:14px;" id="menu-name">Name</span>
      <span style="font-size:12px;color:var(--muted);" id="menu-role">Athlete</span>
    </div>
    <div class="divider"></div>
    <div class="profile-menu-item" id="menu-change-pin" onclick="openChangePinModal()">🔑 Change PIN</div>
    <div class="profile-menu-item hidden" id="menu-admin-panel" onclick="openAdminPanelModal()">⚙️ Admin Panel</div>
    <div class="divider"></div>
    <div class="profile-menu-item danger" onclick="logout()">⏻ Sign Out</div>
  </div>

  <!-- Parent Athlete Switcher -->
  <div id="athlete-select-bar" class="athlete-select-bar hidden"></div>

  <!-- Week Selector -->
  <div class="week-bar" id="week-bar"></div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('overview')">Overview</div>
    <div class="tab" onclick="switchTab('workouts')">Workouts</div>
    <div class="tab" onclick="switchTab('games')">Games</div>
    <div class="tab" onclick="switchTab('schedule')">Schedule</div>
    <div class="tab" onclick="switchTab('goals')">Goals</div>
    <div class="tab" onclick="switchTab('nutrition')">Nutrition</div>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>

</div>

</div><!-- end #app -->

<!-- ═══════════════════════════════ MODALS ═══════════════════════════════ -->
<div class="overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="drawer" id="modal-drawer">
    <div class="drawer-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════ DATA LAYER ═══════════════════════════════

const DB = {
  get: (k) => { try { return JSON.parse(localStorage.getItem(k)) || null; } catch { return null; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  getUsers: () => DB.get('at_users') || [],
  saveUsers: (u) => DB.set('at_users', u),
  getData: (uid, section, week) => DB.get(`at_${uid}_${section}_${week}`) || [],
  saveData: (uid, section, week, data) => DB.set(`at_${uid}_${section}_${week}`, data),
  getGoals: (uid) => DB.get(`at_${uid}_goals`) || [],
  saveGoals: (uid, g) => DB.set(`at_${uid}_goals`, g),
};

// ─── Seed admin if none exists ───
(function initAdmin() {
  const users = DB.getUsers();
  if (!users.find(u => u.role === 'admin')) {
    users.push({ id: 'admin', username: 'admin', pin: '0000', name: 'Admin', role: 'admin', sport: '', position: '' });
    DB.saveUsers(users);
  }
  // Seed parent account if none
  if (!users.find(u => u.role === 'parent')) {
    users.push({ id: 'parent1', username: 'parent', pin: '1111', name: 'Parent', role: 'parent', sport: '', position: '' });
    DB.saveUsers(users);
  }
})();

// ═══════════════════════════════ STATE ═══════════════════════════════
let currentUser = null;
let currentRole = 'athlete';
let activeTab = 'overview';
let activeWeek = getCurrentWeek();
let viewingAthleteId = null; // for parent

function getCurrentWeek() {
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2,'0')}`;
}

function getWeekLabel(w) {
  const [year, week] = w.split('-W');
  const jan1 = new Date(parseInt(year), 0, 1);
  const dayOffset = (jan1.getDay() <= 4 ? 1 - jan1.getDay() : 8 - jan1.getDay());
  const weekStart = new Date(jan1);
  weekStart.setDate(jan1.getDate() + dayOffset + (parseInt(week) - 1) * 7);
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
  const fmt = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return `${fmt(weekStart)} – ${fmt(weekEnd)}`;
}

function generateWeeks() {
  const weeks = [];
  const cur = getCurrentWeek();
  const [y, w] = cur.split('-W');
  for (let i = -4; i <= 2; i++) {
    let wn = parseInt(w) + i;
    let yn = parseInt(y);
    if (wn < 1) { yn--; wn = 52 + wn; }
    if (wn > 52) { yn++; wn = wn - 52; }
    weeks.push(`${yn}-W${String(wn).padStart(2,'0')}`);
  }
  return weeks;
}

// ═══════════════════════════════ AUTH ═══════════════════════════════
function setRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach((t,i) => {
    t.classList.toggle('active', ['athlete','parent','admin'][i] === role);
  });
  const switchLink = document.getElementById('auth-switch-link');
  switchLink.style.display = role === 'athlete' ? 'block' : 'none';
  document.getElementById('login-title').textContent = role === 'admin' ? 'Admin Sign In' : role === 'parent' ? 'Parent Sign In' : 'Athlete Sign In';
}

function showRegister() {
  document.getElementById('login-form').classList.add('hidden');
  document.getElementById('register-form').classList.remove('hidden');
  document.getElementById('auth-switch-link').style.display = 'none';
}

function showLogin() {
  document.getElementById('login-form').classList.remove('hidden');
  document.getElementById('register-form').classList.add('hidden');
  document.getElementById('auth-switch-link').style.display = 'block';
}

function login() {
  const username = document.getElementById('login-username').value.trim();
  const pin = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  const users = DB.getUsers();
  const user = users.find(u => u.username === username && u.pin === pin);
  if (!user) { errEl.textContent = 'Invalid username or PIN'; errEl.style.display = 'block'; return; }
  if (currentRole === 'parent' && user.role !== 'parent' && user.role !== 'admin') {
    errEl.textContent = 'Not a parent account'; errEl.style.display = 'block'; return;
  }
  if (currentRole === 'admin' && user.role !== 'admin') {
    errEl.textContent = 'Not an admin account'; errEl.style.display = 'block'; return;
  }
  if (currentRole === 'athlete' && user.role !== 'athlete') {
    errEl.textContent = 'Not an athlete account'; errEl.style.display = 'block'; return;
  }
  currentUser = user;
  enterApp();
}

function registerAthlete() {
  const name = document.getElementById('reg-name').value.trim();
  const username = document.getElementById('reg-username').value.trim();
  const pin = document.getElementById('reg-pin').value.trim();
  const sport = document.getElementById('reg-sport').value.trim();
  const position = document.getElementById('reg-position').value.trim();
  if (!name || !username || !pin) { showToast('Fill in all required fields'); return; }
  if (pin.length !== 4) { showToast('PIN must be 4 digits'); return; }
  const users = DB.getUsers();
  if (users.find(u => u.username === username)) { showToast('Username already taken'); return; }
  const newUser = { id: 'athlete_' + Date.now(), username, pin, name, role: 'athlete', sport, position };
  users.push(newUser);
  DB.saveUsers(users);
  showToast('Athlete account created!');
  showLogin();
  ['reg-name','reg-username','reg-pin','reg-sport','reg-position'].forEach(id => document.getElementById(id).value = '');
}

function logout() {
  currentUser = null;
  viewingAthleteId = null;
  activeTab = 'overview';
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('main-screen').classList.add('hidden');
  document.getElementById('login-username').value = '';
  document.getElementById('login-pin').value = '';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('profile-menu').classList.remove('open');
}

function enterApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');

  const isParent = currentUser.role === 'parent' || currentUser.role === 'admin';
  const parentBar = document.getElementById('athlete-select-bar');

  if (isParent) {
    document.getElementById('parent-badge').classList.remove('hidden');
    parentBar.classList.remove('hidden');
    buildAthleteSelector();
    const athletes = DB.getUsers().filter(u => u.role === 'athlete');
    if (athletes.length > 0) {
      viewingAthleteId = athletes[0].id;
      setTopbarForAthlete(athletes[0]);
    } else {
      viewingAthleteId = null;
    }
  } else {
    document.getElementById('parent-badge').classList.add('hidden');
    parentBar.classList.add('hidden');
    viewingAthleteId = currentUser.id;
    document.getElementById('topbar-name').textContent = currentUser.name;
    document.getElementById('topbar-sport').textContent = [currentUser.sport, currentUser.position].filter(Boolean).join(' · ') || 'Athlete';
    document.getElementById('user-avatar').textContent = currentUser.name[0].toUpperCase();
  }

  document.getElementById('menu-name').textContent = currentUser.name;
  document.getElementById('menu-role').textContent = currentUser.role.charAt(0).toUpperCase() + currentUser.role.slice(1);
  document.getElementById('menu-admin-panel').classList.toggle('hidden', currentUser.role !== 'admin');
  document.getElementById('menu-change-pin').classList.toggle('hidden', currentUser.role === 'admin');

  buildWeekBar();
  switchTab('overview');
}

function setTopbarForAthlete(athlete) {
  document.getElementById('topbar-name').textContent = athlete.name;
  document.getElementById('topbar-sport').textContent = [athlete.sport, athlete.position].filter(Boolean).join(' · ') || 'Athlete';
  document.getElementById('user-avatar').textContent = athlete.name[0].toUpperCase();
}

function buildAthleteSelector() {
  const bar = document.getElementById('athlete-select-bar');
  const athletes = DB.getUsers().filter(u => u.role === 'athlete');
  if (athletes.length === 0) { bar.innerHTML = '<span style="color:var(--muted);font-size:13px;padding:8px;">No athletes yet — create accounts via Admin</span>'; return; }
  bar.innerHTML = athletes.map((a,i) => `
    <div class="athlete-btn ${i===0?'active':''}" id="abtn_${a.id}" onclick="selectAthlete('${a.id}')">
      <div class="av">${a.name[0]}</div>
      <span>${a.name}</span>
    </div>
  `).join('');
}

function selectAthlete(id) {
  viewingAthleteId = id;
  document.querySelectorAll('.athlete-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('abtn_' + id)?.classList.add('active');
  const athlete = DB.getUsers().find(u => u.id === id);
  if (athlete) setTopbarForAthlete(athlete);
  renderTab(activeTab);
}

// ═══════════════════════════════ WEEK BAR ═══════════════════════════════
function buildWeekBar() {
  const bar = document.getElementById('week-bar');
  const weeks = generateWeeks();
  activeWeek = getCurrentWeek();
  bar.innerHTML = weeks.map(w => `
    <div class="week-chip ${w === activeWeek ? 'active' : ''}" id="wc_${w}" onclick="selectWeek('${w}')">
      ${w === getCurrentWeek() ? 'This Week' : getWeekLabel(w)}
    </div>
  `).join('');
}

function selectWeek(w) {
  activeWeek = w;
  document.querySelectorAll('.week-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('wc_' + w)?.classList.add('active');
  renderTab(activeTab);
}

// ═══════════════════════════════ TABS ═══════════════════════════════
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['overview','workouts','games','schedule','goals','nutrition'][i] === tab);
  });
  renderTab(tab);
}

function renderTab(tab) {
  const c = document.getElementById('content');
  const uid = viewingAthleteId;
  const isReadOnly = currentUser.role === 'parent';

  if (!uid && (currentUser.role === 'parent' || currentUser.role === 'admin')) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><h3>No athletes yet</h3><p>Create athlete accounts via Admin login</p></div>`;
    return;
  }

  if (tab === 'overview') renderOverview(uid, c, isReadOnly);
  else if (tab === 'workouts') renderWorkouts(uid, c, isReadOnly);
  else if (tab === 'games') renderGames(uid, c, isReadOnly);
  else if (tab === 'schedule') renderSchedule(uid, c, isReadOnly);
  else if (tab === 'goals') renderGoals(uid, c, isReadOnly);
  else if (tab === 'nutrition') renderNutrition(uid, c, isReadOnly);
}

      <div class="field"><label>Notes / How you felt</label><textarea id="f-notes" placeholder="Energy levels, recovery notes..."></textarea></div>
      <button class="btn btn-primary" onclick="saveNutrition()">Save Entry</button>
    `
  };

  mc.innerHTML = forms[type] || '';
  overlay.classList.add('open');
}

function openEditGoal(i) {
  const uid = viewingAthleteId;
  const goals = DB.getGoals(uid);
  const g = goals[i];
  const overlay = document.getElementById('modal-overlay');
  const mc = document.getElementById('modal-content');
  mc.innerHTML = `
    <div class="drawer-title">Update Goal</div>
    <div class="card-title" style="margin-bottom:12px;">${g.title}</div>
    <div class="field"><label>Progress (${g.progress}%)</label>
      <input type="range" id="f-progress" min="0" max="100" value="${g.progress}" oninput="document.getElementById('prog-val2').textContent=this.value+'%'">
      <span id="prog-val2" style="font-size:13px;color:var(--accent);">${g.progress}%</span>
    </div>
    <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Update...">${g.notes || ''}</textarea></div>
    <div class="field">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" id="f-done" ${g.done ? 'checked' : ''} style="width:18px;height:18px;accent-color:var(--accent);">
        Mark as complete
      </label>
    </div>
    <button class="btn btn-primary" onclick="updateGoal(${i})">Update Goal</button>
  `;
  overlay.classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ═══════════════════════════════ SAVE ACTIONS ═══════════════════════════════
function saveWorkout() {
  const uid = viewingAthleteId;
  const items = DB.getData(uid, 'workouts', activeWeek);
  items.push({
    type: document.getElementById('f-type').value,
    date: document.getElementById('f-date').value,
    duration: document.getElementById('f-duration').value || '0',
    exercises: document.getElementById('f-exercises').value,
    notes: document.getElementById('f-notes').value
  });
  DB.saveData(uid, 'workouts', activeWeek, items);
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('Workout logged!');
  renderTab('workouts');
}

function saveGame() {
  const uid = viewingAthleteId;
  const items = DB.getData(uid, 'games', activeWeek);
  items.push({
    opponent: document.getElementById('f-opponent').value || 'Unknown',
    date: document.getElementById('f-date').value,
    location: document.getElementById('f-location').value,
    result: document.getElementById('f-result').value,
    score: document.getElementById('f-score').value,
    stats: document.getElementById('f-stats').value,
    notes: document.getElementById('f-notes').value
  });
  DB.saveData(uid, 'games', activeWeek, items);
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('Game logged!');
  renderTab('games');
}

function saveSchedule() {
  const uid = viewingAthleteId;
  const items = DB.getData(uid, 'schedule', activeWeek);
  const time = document.getElementById('f-time').value;
  const fmtTime = time ? new Date('1970-01-01T' + time).toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'}) : '';
  items.push({
    day: document.getElementById('f-day').value,
    time: fmtTime,
    event: document.getElementById('f-event').value || 'Event',
    note: document.getElementById('f-note').value
  });
  DB.saveData(uid, 'schedule', activeWeek, items);
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('Added to schedule!');
  renderTab('schedule');
}

function saveGoal() {
  const uid = viewingAthleteId;
  const goals = DB.getGoals(uid);
  goals.push({
    title: document.getElementById('f-title').value || 'Goal',
    category: document.getElementById('f-category').value,
    target: document.getElementById('f-target').value,
    progress: parseInt(document.getElementById('f-progress').value) || 0,
    notes: document.getElementById('f-notes').value,
    done: false
  });
  DB.saveGoals(uid, goals);
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('Goal set!');
  renderTab('goals');
}

function updateGoal(i) {
  const uid = viewingAthleteId;
  const goals = DB.getGoals(uid);
  goals[i].progress = parseInt(document.getElementById('f-progress').value) || 0;
  goals[i].notes = document.getElementById('f-notes').value;
  goals[i].done = document.getElementById('f-done').checked;
  DB.saveGoals(uid, goals);
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('Goal updated!');
  renderTab('goals');
}

function saveNutrition() {
  const uid = viewingAthleteId;
  const items = DB.getData(uid, 'nutrition', activeWeek);
  items.push({
    date: document.getElementById('f-date').value,
    meal: document.getElementById('f-meal').value,
    foods: document.getElementById('f-foods').value,
    calories: document.getElementById('f-calories').value,
    hydration: document.getElementById('f-hydration').value,
    sleep: document.getElementById('f-sleep').value,
    notes: document.getElementById('f-notes').value
  });
  DB.saveData(uid, 'nutrition', activeWeek, items);
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('Entry saved!');
  renderTab('nutrition');
}

function deleteItem(section, i) {
  if (!confirm('Delete this entry?')) return;
  const uid = viewingAthleteId;
  const items = DB.getData(uid, section, activeWeek);
  items.splice(i, 1);
  DB.saveData(uid, section, activeWeek, items);
  showToast('Deleted');
  renderTab(activeTab);
}

function deleteGoal(i) {
  if (!confirm('Delete this goal?')) return;
  const uid = viewingAthleteId;
  const goals = DB.getGoals(uid);
  goals.splice(i, 1);
  DB.saveGoals(uid, goals);
  showToast('Goal deleted');
  renderTab('goals');
}

// ═══════════════════════════════ UI HELPERS ═══════════════════════════════
function toggleProfileMenu() {
  document.getElementById('profile-menu').classList.toggle('open');
}

document.addEventListener('click', (e) => {
  const menu = document.getElementById('profile-menu');
  const avatar = document.getElementById('user-avatar');
  if (menu.classList.contains('open') && !menu.contains(e.target) && !avatar.contains(e.target)) {
    menu.classList.remove('open');
  }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════ CHANGE PIN (athlete self-service) ═══════════════════════════════
function openChangePinModal() {
  document.getElementById('profile-menu').classList.remove('open');
  const mc = document.getElementById('modal-content');
  mc.innerHTML = `
    <div class="drawer-title">Change PIN</div>
    <div class="field">
      <label>Current PIN</label>
      <input type="password" id="cp-current" placeholder="••••" maxlength="4" inputmode="numeric">
    </div>
    <div class="field">
      <label>New PIN (4 digits)</label>
      <input type="password" id="cp-new" placeholder="••••" maxlength="4" inputmode="numeric">
    </div>
    <div class="field">
      <label>Confirm New PIN</label>
      <input type="password" id="cp-confirm" placeholder="••••" maxlength="4" inputmode="numeric">
    </div>
    <div id="cp-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;"></div>
    <button class="btn btn-primary" onclick="saveNewPin()">Update PIN</button>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function saveNewPin() {
  const current = document.getElementById('cp-current').value;
  const newPin  = document.getElementById('cp-new').value;
  const confirm = document.getElementById('cp-confirm').value;
  const errEl   = document.getElementById('cp-error');
  errEl.style.display = 'none';

  if (current !== currentUser.pin) {
    errEl.textContent = 'Current PIN is incorrect'; errEl.style.display = 'block'; return;
  }
  if (newPin.length !== 4 || !/^\d{4}$/.test(newPin)) {
    errEl.textContent = 'New PIN must be exactly 4 digits'; errEl.style.display = 'block'; return;
  }
  if (newPin !== confirm) {
    errEl.textContent = 'PINs do not match'; errEl.style.display = 'block'; return;
  }

  const users = DB.getUsers();
  const idx = users.findIndex(u => u.id === currentUser.id);
  users[idx].pin = newPin;
  DB.saveUsers(users);
  currentUser.pin = newPin;
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('PIN updated!');
}

// ═══════════════════════════════ ADMIN PANEL (reset any athlete PIN) ═══════════════════════════════
function openAdminPanelModal() {
  document.getElementById('profile-menu').classList.remove('open');
  const athletes = DB.getUsers().filter(u => u.role === 'athlete');
  const mc = document.getElementById('modal-content');
  mc.innerHTML = `
    <div class="drawer-title">Admin Panel</div>
    <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;">Reset Athlete PIN</div>
    ${athletes.length === 0 ? `<div class="empty"><div class="empty-icon">👤</div><h3>No athletes yet</h3><p>Create athlete accounts first</p></div>` : `
      <div class="field">
        <label>Select Athlete</label>
        <select id="ap-athlete">
          ${athletes.map(a => `<option value="${a.id}">${a.name} (@${a.username})</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>New PIN (4 digits)</label>
        <input type="password" id="ap-new-pin" placeholder="••••" maxlength="4" inputmode="numeric">
      </div>
      <div class="field">
        <label>Confirm New PIN</label>
        <input type="password" id="ap-confirm-pin" placeholder="••••" maxlength="4" inputmode="numeric">
      </div>
      <div id="ap-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;"></div>
      <button class="btn btn-primary" onclick="adminResetPin()">Reset PIN</button>
    `}
    <div class="divider" style="margin:20px 0;"></div>
    <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;">Admin PIN</div>
    <div class="field">
      <label>New Admin PIN (4 digits)</label>
      <input type="password" id="ap-admin-pin" placeholder="••••" maxlength="4" inputmode="numeric">
    </div>
    <div id="ap-admin-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;"></div>
    <button class="btn btn-ghost" onclick="adminChangeOwnPin()">Change Admin PIN</button>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function adminResetPin() {
  const athleteId = document.getElementById('ap-athlete').value;
  const newPin    = document.getElementById('ap-new-pin').value;
  const confirm   = document.getElementById('ap-confirm-pin').value;
  const errEl     = document.getElementById('ap-error');
  errEl.style.display = 'none';

  if (newPin.length !== 4 || !/^\d{4}$/.test(newPin)) {
    errEl.textContent = 'PIN must be exactly 4 digits'; errEl.style.display = 'block'; return;
  }
  if (newPin !== confirm) {
    errEl.textContent = 'PINs do not match'; errEl.style.display = 'block'; return;
  }

  const users = DB.getUsers();
  const idx = users.findIndex(u => u.id === athleteId);
  const athleteName = users[idx].name;
  users[idx].pin = newPin;
  DB.saveUsers(users);
  document.getElementById('modal-overlay').classList.remove('open');
  showToast(`PIN reset for ${athleteName}!`);
}

function adminChangeOwnPin() {
  const newPin = document.getElementById('ap-admin-pin').value;
  const errEl  = document.getElementById('ap-admin-error');
  errEl.style.display = 'none';

  if (newPin.length !== 4 || !/^\d{4}$/.test(newPin)) {
    errEl.textContent = 'PIN must be exactly 4 digits'; errEl.style.display = 'block'; return;
  }

  const users = DB.getUsers();
  const idx = users.findIndex(u => u.id === currentUser.id);
  users[idx].pin = newPin;
  DB.saveUsers(users);
  currentUser.pin = newPin;
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('Admin PIN updated!');
}
</script>
