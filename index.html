<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Athlete Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --surface3: #252532;
  --border: rgba(255,255,255,0.07);
  --accent: #c8ff00;
  --accent2: #00d4ff;
  --accent3: #ff6b35;
  --text: #f0f0f0;
  --muted: #888;
  --danger: #ff4d4d;
  --success: #00e676;
  --r: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; overflow-x: hidden; }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
#app { min-height: 100vh; display: flex; flex-direction: column; }

/* Loading */
#loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
.loading-logo { font-family: 'Bebas Neue', cursive; font-size: 52px; color: var(--accent); letter-spacing: 3px; margin-bottom: 20px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Auth */
#auth-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; min-height: 100vh; }
.auth-logo { font-family: 'Bebas Neue', cursive; font-size: 52px; color: var(--accent); letter-spacing: 3px; line-height: 1; margin-bottom: 6px; }
.auth-sub { color: var(--muted); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; width: 100%; max-width: 380px; }
.auth-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.field input, .field select, .field textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color .2s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 80px; }
.field select option { background: var(--surface2); }
.btn { width: 100%; padding: 14px; border-radius: var(--r); border: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-primary { background: var(--accent); color: #0a0a0f; }
.btn-primary:active { opacity: 0.85; transform: scale(0.98); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); margin-top: 10px; }
.role-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.role-tab { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; text-align: center; }
.role-tab.active { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }
.auth-switch { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
.auth-switch span { color: var(--accent); cursor: pointer; font-weight: 500; }

/* Main */
#main-screen { flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border); }
.topbar-logo { font-family: 'Bebas Neue', cursive; font-size: 24px; color: var(--accent); letter-spacing: 2px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); color: #0a0a0f; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.role-badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; letter-spacing: .5px; color: #0a0a0f; }

/* Week bar */
.week-bar { display: flex; align-items: center; gap: 10px; padding: 10px 20px; overflow-x: auto; scrollbar-width: none; }
.week-bar::-webkit-scrollbar { display: none; }
.week-chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); font-size: 12px; color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap; }
.week-chip.active { background: var(--accent); color: #0a0a0f; border-color: var(--accent); font-weight: 600; }

/* Tabs */
.tabs { display: flex; padding: 0 20px; gap: 6px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 12px 14px 10px; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Content */
.content { flex: 1; padding: 20px; padding-bottom: 100px; overflow-y: auto; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-family: 'Bebas Neue', cursive; font-size: 28px; letter-spacing: 2px; }
.btn-add { background: var(--accent); color: #0a0a0f; border: none; border-radius: 10px; padding: 8px 16px; font-weight: 700; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.card-title { font-weight: 600; font-size: 15px; }
.card-meta { font-size: 12px; color: var(--muted); }
.card-body { font-size: 14px; color: var(--muted); line-height: 1.6; }
.card-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn-small { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.btn-small.del { color: var(--danger); border-color: var(--danger); }

/* Tags */
.tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-right: 6px; margin-bottom: 4px; }
.tag-green { background: rgba(0,230,118,0.12); color: var(--success); }
.tag-blue { background: rgba(0,212,255,0.12); color: var(--accent2); }
.tag-orange { background: rgba(255,107,53,0.12); color: var(--accent3); }
.tag-yellow { background: rgba(200,255,0,0.12); color: var(--accent); }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 10px; text-align: center; }
.stat-num { font-family: 'Bebas Neue', cursive; font-size: 32px; color: var(--accent); line-height: 1; }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

/* Progress */
.progress-wrap { margin: 8px 0; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.progress-bar { height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s ease; }

/* Modal */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.drawer { background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; animation: slideUp .25s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.drawer-handle { width: 40px; height: 4px; background: var(--surface3); border-radius: 2px; margin: 0 auto 20px; }
.drawer-title { font-family: 'Bebas Neue', cursive; font-size: 26px; letter-spacing: 2px; margin-bottom: 20px; }

/* Athlete selector */
.athlete-select-bar { display: flex; gap: 8px; padding: 12px 20px; overflow-x: auto; scrollbar-width: none; background: var(--surface); border-bottom: 1px solid var(--border); }
.athlete-select-bar::-webkit-scrollbar { display: none; }
.athlete-btn { flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; transition: all .15s; }
.athlete-btn.active { border-color: var(--accent2); background: rgba(0,212,255,0.1); }
.athlete-btn .av { width: 24px; height: 24px; border-radius: 50%; background: var(--accent2); color: #0a0a0f; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.athlete-btn span { font-size: 13px; font-weight: 500; color: var(--text); }

/* Profile menu */
.profile-menu { position: absolute; top: 58px; right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 8px; min-width: 180px; z-index: 200; display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.profile-menu.open { display: block; }
.profile-menu-item { padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background .15s; display: flex; align-items: center; gap: 10px; }
.profile-menu-item:hover { background: var(--surface2); }
.profile-menu-item.danger { color: var(--danger); }
.divider { height: 1px; background: var(--border); margin: 4px 0; }

/* Timeline */
.timeline { position: relative; padding-left: 28px; }
.timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: var(--surface3); }
.timeline-item { position: relative; margin-bottom: 16px; }
.timeline-dot { position: absolute; left: -24px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
.timeline-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); margin-bottom: 2px; }
.timeline-event { font-size: 14px; font-weight: 500; }
.timeline-note { font-size: 12px; color: var(--muted); }

/* Empty */
.empty { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty h3 { font-size: 16px; font-weight: 500; margin-bottom: 6px; color: var(--text); }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #0a0a0f; padding: 12px 24px; border-radius: 30px; font-weight: 600; font-size: 14px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">

<!-- Loading -->
<div id="loading-screen">
  <div class="loading-logo">AT</div>
  <div class="spinner"></div>
</div>

<!-- Auth -->
<div id="auth-screen" class="hidden">
  <div class="auth-logo">ATHLETE<br>TRACKER</div>
  <div class="auth-sub">Performance Dashboard</div>
  <div class="auth-card">
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('athlete')">Athlete</button>
      <button class="role-tab" onclick="setRole('parent')">Parent View</button>
      <button class="role-tab" onclick="setRole('admin')">Admin</button>
    </div>
    <div id="login-form">
      <h2 id="login-title">Sign In</h2>
      <div class="field"><label>Username</label><input type="text" id="login-username" placeholder="Enter your username" autocomplete="username"></div>
      <div class="field"><label>PIN (4 digits)</label><input type="password" id="login-pin" placeholder="••••" maxlength="4" inputmode="numeric"></div>
      <button class="btn btn-primary" onclick="login()">Sign In</button>
      <div id="login-error" style="color:var(--danger);font-size:13px;text-align:center;margin-top:10px;display:none;"></div>
    </div>
    <div id="register-form" class="hidden">
      <h2>Create Athlete Account</h2>
      <div class="field"><label>Athlete Name</label><input type="text" id="reg-name" placeholder="Full name"></div>
      <div class="field"><label>Username</label><input type="text" id="reg-username" placeholder="Choose a username"></div>
      <div class="field"><label>PIN (4 digits)</label><input type="password" id="reg-pin" placeholder="••••" maxlength="4" inputmode="numeric"></div>
      <div class="field"><label>Sport</label><input type="text" id="reg-sport" placeholder="e.g. Basketball, Soccer"></div>
      <div class="field"><label>Position / Role</label><input type="text" id="reg-position" placeholder="e.g. Point Guard"></div>
      <button class="btn btn-primary" onclick="registerAthlete()">Create Account</button>
      <button class="btn btn-ghost" onclick="showLogin()">Back to Login</button>
    </div>
  </div>
  <div class="auth-switch" id="auth-switch-link">Admin? <span onclick="showRegister()">Set up athlete accounts</span></div>
</div>

<!-- Main -->
<div id="main-screen" class="hidden">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="topbar-logo">AT</div>
      <div>
        <div style="font-weight:600;font-size:14px;" id="topbar-name">Athlete</div>
        <div style="font-size:12px;color:var(--muted);" id="topbar-sport">—</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="role-badge hidden" id="role-badge"></span>
      <div class="avatar" id="user-avatar" onclick="toggleProfileMenu()">A</div>
    </div>
  </div>

  <div class="profile-menu" id="profile-menu">
    <div class="profile-menu-item" style="flex-direction:column;align-items:flex-start;gap:2px;">
      <span style="font-weight:600;font-size:14px;" id="menu-name">Name</span>
      <span style="font-size:12px;color:var(--muted);" id="menu-role">Athlete</span>
    </div>
    <div class="divider"></div>
    <div class="profile-menu-item" id="menu-change-pin" onclick="openChangePinModal()">🔑 Change PIN</div>
    <div class="profile-menu-item hidden" id="menu-admin-panel" onclick="openAdminPanelModal()">⚙️ Admin Panel</div>
    <div class="divider"></div>
    <div class="profile-menu-item danger" onclick="logout()">⏻ Sign Out</div>
  </div>

  <div id="athlete-select-bar" class="athlete-select-bar hidden"></div>
  <div class="week-bar" id="week-bar"></div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('overview')">Overview</div>
    <div class="tab" onclick="switchTab('workouts')">Workouts</div>
    <div class="tab" onclick="switchTab('games')">Games</div>
    <div class="tab" onclick="switchTab('schedule')">Schedule</div>
    <div class="tab" onclick="switchTab('goals')">Goals</div>
    <div class="tab" onclick="switchTab('nutrition')">Nutrition</div>
  </div>
  <div class="content" id="content"></div>
</div>
</div>

<div class="overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="drawer"><div class="drawer-handle"></div><div id="modal-content"></div></div>
</div>
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDei4izfhywYp_oxjFrUGBfPREUnNioM1s",
  authDomain: "adptracker-d0e45.firebaseapp.com",
  databaseURL: "https://adptracker-d0e45-default-rtdb.firebaseio.com",
  projectId: "adptracker-d0e45",
  storageBucket: "adptracker-d0e45.firebasestorage.app",
  messagingSenderId: "743130182241",
  appId: "1:743130182241:web:16acc72b7bd44edc257020"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── Firebase helpers ──
async function fbGet(path) {
  const snap = await get(ref(db, path));
  return snap.exists() ? snap.val() : null;
}
async function fbSet(path, val) { await set(ref(db, path), val); }
async function fbUpdate(path, val) { await update(ref(db, path), val); }
async function fbRemove(path) { await remove(ref(db, path)); }

// ── State ──
let currentUser = null;
let currentRole = 'athlete';
let activeTab = 'overview';
let activeWeek = getCurrentWeek();
let viewingAthleteId = null;
let allUsers = {};

// ── Init: seed default accounts if missing ──
async function initDefaults() {
  const users = await fbGet('users');
  if (!users || !users['admin']) {
    await fbSet('users/admin', { id: 'admin', username: 'admin', pin: '0000', name: 'Admin', role: 'admin', sport: '', position: '' });
  }
  if (!users || !users['parent1']) {
    await fbSet('users/parent1', { id: 'parent1', username: 'parent', pin: '1111', name: 'Parent', role: 'parent', sport: '', position: '' });
  }
  const snap = await fbGet('users');
  allUsers = snap || {};
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
}

// ── Auth ──
function setRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach((t,i) => t.classList.toggle('active', ['athlete','parent','admin'][i] === role));
  document.getElementById('auth-switch-link').style.display = role === 'athlete' ? 'block' : 'none';
  document.getElementById('login-title').textContent = role === 'admin' ? 'Admin Sign In' : role === 'parent' ? 'Parent Sign In' : 'Athlete Sign In';
}
window.setRole = setRole;

async function login() {
  const username = document.getElementById('login-username').value.trim();
  const pin = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  const snap = await fbGet('users');
  allUsers = snap || {};
  const user = Object.values(allUsers).find(u => u.username.toLowerCase() === username.toLowerCase() && u.pin === pin);
  if (!user) { errEl.textContent = 'Invalid username or PIN'; errEl.style.display = 'block'; return; }
  if (currentRole === 'parent' && user.role !== 'parent') { errEl.textContent = 'Not a parent account'; errEl.style.display = 'block'; return; }
  if (currentRole === 'admin' && user.role !== 'admin') { errEl.textContent = 'Not an admin account'; errEl.style.display = 'block'; return; }
  if (currentRole === 'athlete' && user.role !== 'athlete') { errEl.textContent = 'Not an athlete account'; errEl.style.display = 'block'; return; }
  currentUser = user;
  enterApp();
}
window.login = login;

async function registerAthlete() {
  const name = document.getElementById('reg-name').value.trim();
  const username = document.getElementById('reg-username').value.trim();
  const pin = document.getElementById('reg-pin').value.trim();
  const sport = document.getElementById('reg-sport').value.trim();
  const position = document.getElementById('reg-position').value.trim();
  if (!name || !username || !pin) { showToast('Fill in all required fields'); return; }
  if (pin.length !== 4) { showToast('PIN must be 4 digits'); return; }
  const snap = await fbGet('users');
  allUsers = snap || {};
  if (Object.values(allUsers).find(u => u.username.toLowerCase() === username.toLowerCase())) { showToast('Username already taken'); return; }
  const id = 'athlete_' + Date.now();
  const newUser = { id, username, pin, name, role: 'athlete', sport, position };
  await fbSet('users/' + id, newUser);
  allUsers[id] = newUser;
  showToast('Athlete account created!');
  showLogin();
  ['reg-name','reg-username','reg-pin','reg-sport','reg-position'].forEach(i => document.getElementById(i).value = '');
}
window.registerAthlete = registerAthlete;

function logout() {
  currentUser = null; viewingAthleteId = null; activeTab = 'overview';
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('main-screen').classList.add('hidden');
  document.getElementById('login-username').value = '';
  document.getElementById('login-pin').value = '';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('profile-menu').classList.remove('open');
}
window.logout = logout;

function showLogin() {
  document.getElementById('login-form').classList.remove('hidden');
  document.getElementById('register-form').classList.add('hidden');
  document.getElementById('auth-switch-link').style.display = 'block';
}
window.showLogin = showLogin;

function showRegister() {
  document.getElementById('login-form').classList.add('hidden');
  document.getElementById('register-form').classList.remove('hidden');
  document.getElementById('auth-switch-link').style.display = 'none';
}
window.showRegister = showRegister;

function enterApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  const badge = document.getElementById('role-badge');
  const bar = document.getElementById('athlete-select-bar');

  if (currentUser.role === 'admin') {
    badge.textContent = 'ADMIN'; badge.style.background = 'var(--accent)'; badge.classList.remove('hidden');
    bar.classList.remove('hidden'); buildAthleteSelector();
    const athletes = Object.values(allUsers).filter(u => u.role === 'athlete');
    if (athletes.length > 0) { viewingAthleteId = athletes[0].id; setTopbar(athletes[0]); }
    document.getElementById('user-avatar').textContent = 'A';
    document.getElementById('menu-admin-panel').classList.remove('hidden');
    document.getElementById('menu-change-pin').classList.add('hidden');
  } else if (currentUser.role === 'parent') {
    badge.textContent = 'PARENT VIEW'; badge.style.background = 'var(--accent2)'; badge.classList.remove('hidden');
    bar.classList.remove('hidden'); buildAthleteSelector();
    const athletes = Object.values(allUsers).filter(u => u.role === 'athlete');
    if (athletes.length > 0) { viewingAthleteId = athletes[0].id; setTopbar(athletes[0]); }
    document.getElementById('user-avatar').textContent = currentUser.name[0].toUpperCase();
    document.getElementById('menu-admin-panel').classList.add('hidden');
    document.getElementById('menu-change-pin').classList.remove('hidden');
  } else {
    badge.classList.add('hidden'); bar.classList.add('hidden');

// ── Week bar ──
function getCurrentWeek() {
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  const day = d.getUTCDay() || 7; d.setUTCDate(d.getUTCDate() + 4 - day);
  const y = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return `${d.getUTCFullYear()}-W${String(Math.ceil((((d-y)/86400000)+1)/7)).padStart(2,'0')}`;
}

function getWeekLabel(w) {
  const [year, week] = w.split('-W');
  const jan1 = new Date(parseInt(year), 0, 1);
  const off = (jan1.getDay() <= 4 ? 1 - jan1.getDay() : 8 - jan1.getDay());
  const start = new Date(jan1); start.setDate(jan1.getDate() + off + (parseInt(week)-1)*7);
  const end = new Date(start); end.setDate(start.getDate()+6);
  const fmt = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${fmt(start)} – ${fmt(end)}`;
}

function buildWeekBar() {
  const bar = document.getElementById('week-bar');
  activeWeek = getCurrentWeek();
  const [y,w] = activeWeek.split('-W');
  const weeks = [];
  for (let i=-4;i<=2;i++) {
    let wn=parseInt(w)+i, yn=parseInt(y);
    if(wn<1){yn--;wn=52+wn;} if(wn>52){yn++;wn=wn-52;}
    weeks.push(`${yn}-W${String(wn).padStart(2,'0')}`);
  }
  bar.innerHTML = weeks.map(wk => `<div class="week-chip ${wk===activeWeek?'active':''}" id="wc_${wk}" onclick="selectWeek('${wk}')">${wk===activeWeek?'This Week':getWeekLabel(wk)}</div>`).join('');
}

function selectWeek(w) {
  activeWeek = w;
  document.querySelectorAll('.week-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('wc_'+w)?.classList.add('active');
  renderTab(activeTab);
}
window.selectWeek = selectWeek;

// ── Generic list renderer ──
async function renderList(uid,c,ro,section) {
  const data = await fbGet(`data/${uid}/${section}/${activeWeek}`);
  const items = data ? Object.entries(data) : [];
  const titles = {workouts:'Workouts',games:'Games',nutrition:'Nutrition'};
  const icons = {workouts:'💪',games:'🏆',nutrition:'🥗'};
  const emptyMsg = {workouts:'Log a workout',games:'Log a game',nutrition:'Log nutrition'};

  let statsHtml = '';
  if (section==='games' && items.length) {
    const wins = items.filter(([,g])=>g.result==='Win').length;
    const losses = items.filter(([,g])=>g.result==='Loss').length;
    statsHtml = `<div class="stats-row" style="margin-bottom:16px;"><div class="stat-box"><div class="stat-num" style="color:var(--success)">${wins}</div><div class="stat-label">Wins</div></div><div class="stat-box"><div class="stat-num" style="color:var(--danger)">${losses}</div><div class="stat-label">Losses</div></div><div class="stat-box"><div class="stat-num">${items.length}</div><div class="stat-label">Total</div></div></div>`;
  }
  if (section==='nutrition' && items.length) {
    const totalCal = items.reduce((s,[,n])=>s+(parseInt(n.calories)||0),0);
    const avg = Math.round(totalCal/items.length);
    statsHtml = `<div class="stats-row" style="margin-bottom:16px;"><div class="stat-box"><div class="stat-num">${items.length}</div><div class="stat-label">Entries</div></div><div class="stat-box"><div class="stat-num" style="font-size:22px;">${avg}</div><div class="stat-label">Avg Cal</div></div><div class="stat-box"><div class="stat-num">${totalCal}</div><div class="stat-label">Total Cal</div></div></div>`;
  }

  c.innerHTML = `
    <div class="section-header"><div class="section-title">${titles[section]}</div>${!ro?`<button class="btn-add" onclick="openModal('${section}')">+ Add</button>`:''}</div>
    ${statsHtml}

    ${items.map(([key,item]) => renderItemCard(section, key, item, ro, uid)).join('')}
  `;
}

  if (section==='workouts') return `<div class="card"><div class="card-header"><div><div class="card-title">${item.type}</div><div class="card-meta">${item.date}</div></div><span class="tag tag-yellow">${item.duration} min</span></div>${item.exercises?`<div style="margin-bottom:8px;">${item.exercises.split('\n').map(e=>`<span class="tag tag-blue">${e}</span>`).join('')}</div>`:''}<div class="card-body">${item.notes||''}</div>${!ro?`<div class="card-actions"><button class="btn-small del" onclick="deleteEntry('${uid}','workouts','${key}')">Delete</button></div>`:''}</div>`;

  return '';
}

async function saveEntry(type) {

  if (type==='workouts') entry = { type: document.getElementById('f-type').value, date: document.getElementById('f-date').value, duration: document.getElementById('f-duration').value||'0', exercises: document.getElementById('f-exercises').value, notes: document.getElementById('f-notes').value };
  else if (type==='games') entry = { opponent: document.getElementById('f-opponent').value||'Unknown', date: document.getElementById('f-date').value, location: document.getElementById('f-location').value, result: document.getElementById('f-result').value, score: document.getElementById('f-score').value, stats: document.getElementById('f-stats').value, notes: document.getElementById('f-notes').value };
  else if (type==='schedule') { const t=document.getElementById('f-time').value; entry = { day: document.getElementById('f-day').value, time: t?new Date('1970-01-01T'+t).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'', event: document.getElementById('f-event').value||'Event', note: document.getElementById('f-note').value }; await fbSet(`data/${uid}/schedule/${activeWeek}/${key}`, entry); }

  else if (type==='nutrition') entry = { date: document.getElementById('f-date').value, meal: document.getElementById('f-meal').value, foods: document.getElementById('f-foods').value, calories: document.getElementById('f-calories').value, hydration: document.getElementById('f-hydration').value, sleep: document.getElementById('f-sleep').value, notes: document.getElementById('f-notes').value };

function openChangePinModal() {
  document.getElementById('profile-menu').classList.remove('open');
  document.getElementById('modal-content').innerHTML = `<div class="drawer-title">Change PIN</div><div class="field"><label>Current PIN</label><input type="password" id="cp-current" placeholder="••••" maxlength="4" inputmode="numeric"></div><div class="field"><label>New PIN</label><input type="password" id="cp-new" placeholder="••••" maxlength="4" inputmode="numeric"></div><div class="field"><label>Confirm New PIN</label><input type="password" id="cp-confirm" placeholder="••••" maxlength="4" inputmode="numeric"></div><div id="cp-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;"></div><button class="btn btn-primary" onclick="saveNewPin()">Update PIN</button>`;
  document.getElementById('modal-overlay').classList.add('open');
}
window.openChangePinModal = openChangePinModal;

async function saveNewPin() {
  const current=document.getElementById('cp-current').value, newPin=document.getElementById('cp-new').value, confirm=document.getElementById('cp-confirm').value;
  const errEl=document.getElementById('cp-error'); errEl.style.display='none';
  if (current!==currentUser.pin){errEl.textContent='Current PIN is incorrect';errEl.style.display='block';return;}
  if (!/^\d{4}$/.test(newPin)){errEl.textContent='New PIN must be 4 digits';errEl.style.display='block';return;}
  if (newPin!==confirm){errEl.textContent='PINs do not match';errEl.style.display='block';return;}
  await fbUpdate('users/'+currentUser.id, {pin: newPin});
  currentUser.pin=newPin;
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('PIN updated!');
}
window.saveNewPin = saveNewPin;

async function openAdminPanelModal() {
  document.getElementById('profile-menu').classList.remove('open');
  const snap = await fbGet('users');
  allUsers = snap || {};
  const athletes = Object.values(allUsers).filter(u=>u.role==='athlete');
  document.getElementById('modal-content').innerHTML = `<div class="drawer-title">Admin Panel</div>
  <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;">Reset Athlete PIN</div>
  ${!athletes.length ? `<div class="empty"><div class="empty-icon">👤</div><h3>No athletes yet</h3></div>` : `
    <div class="field"><label>Select Athlete</label><select id="ap-athlete" onchange="revealPin()">${athletes.map(a=>`<option value="${a.id}">${a.name} (@${a.username})</option>`).join('')}</select></div>
    <div class="field"><label>Current PIN (tap to reveal)</label><div id="ap-current-pin" onclick="revealPin()" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;font-family:'DM Mono',monospace;color:var(--accent);">Tap to reveal</div></div>
    <div class="field"><label>New PIN</label><input type="password" id="ap-new-pin" placeholder="••••" maxlength="4" inputmode="numeric"></div>
    <div class="field"><label>Confirm New PIN</label><input type="password" id="ap-confirm-pin" placeholder="••••" maxlength="4" inputmode="numeric"></div>
    <div id="ap-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;"></div>
    <button class="btn btn-primary" onclick="adminResetPin()">Reset PIN</button>
  `}
  <div class="divider" style="margin:20px 0;"></div>
  <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;">Admin PIN</div>
  <div class="field"><label>New Admin PIN</label><input type="password" id="ap-admin-pin" placeholder="••••" maxlength="4" inputmode="numeric"></div>
  <div id="ap-admin-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;"></div>
  <button class="btn btn-ghost" onclick="adminChangeOwnPin()">Change Admin PIN</button>`;
  document.getElementById('modal-overlay').classList.add('open');
}
window.openAdminPanelModal = openAdminPanelModal;

function revealPin() {
  const id = document.getElementById('ap-athlete').value;
  const u = Object.values(allUsers).find(u=>u.id===id);
  if (u) document.getElementById('ap-current-pin').textContent = u.pin;
}
window.revealPin = revealPin;

async function adminResetPin() {
  const id=document.getElementById('ap-athlete').value, newPin=document.getElementById('ap-new-pin').value, confirm=document.getElementById('ap-confirm-pin').value;
  const errEl=document.getElementById('ap-error'); errEl.style.display='none';
  if(!/^\d{4}$/.test(newPin)){errEl.textContent='PIN must be 4 digits';errEl.style.display='block';return;}
  if(newPin!==confirm){errEl.textContent='PINs do not match';errEl.style.display='block';return;}
  await fbUpdate('users/'+id, {pin: newPin});
  allUsers[id].pin=newPin;
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('PIN reset!');
}
window.adminResetPin = adminResetPin;

async function adminChangeOwnPin() {
  const newPin=document.getElementById('ap-admin-pin').value;
  const errEl=document.getElementById('ap-admin-error'); errEl.style.display='none';
  if(!/^\d{4}$/.test(newPin)){errEl.textContent='PIN must be 4 digits';errEl.style.display='block';return;}
  await fbUpdate('users/'+currentUser.id, {pin: newPin});
  currentUser.pin=newPin;
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('Admin PIN updated!');
}
window.adminChangeOwnPin = adminChangeOwnPin;

// ── Profile menu ──
function toggleProfileMenu() { document.getElementById('profile-menu').classList.toggle('open'); }
window.toggleProfileMenu = toggleProfileMenu;
document.addEventListener('click', e => {
  const menu=document.getElementById('profile-menu'), av=document.getElementById('user-avatar');
  if (menu.classList.contains('open')&&!menu.contains(e.target)&&!av.contains(e.target)) menu.classList.remove('open');
});

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
window.showToast = showToast;

// ── Boot ──
initDefaults();
</script>
</body>
</html>
