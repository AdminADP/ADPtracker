<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Athlete Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f6f9;
  --surface: #ffffff;
  --surface2: #eef1f6;
  --surface3: #e3e7ee;
  --border: rgba(15,38,68,0.10);
  --navy: #0b5394;
  --navy-dark: #073d6e;
  --accent: #f5890e;
  --accent2: #0b5394;
  --accent3: #f5890e;
  --text: #16243a;
  --muted: #6b7585;
  --muted2: #9aa3b1;
  --danger: #e6483f;
  --success: #1faa6e;
  --r: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; overflow-x: hidden; }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
#app { min-height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }

/* ───────── Loading ───────── */
#loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
.loading-logo { font-family: 'Bebas Neue', cursive; font-size: 52px; color: var(--accent); letter-spacing: 3px; margin-bottom: 20px; }
.spinner { width: 30px; height: 30px; border: 3px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ───────── Auth ───────── */
#auth-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; min-height: 100vh; }
.auth-logo { font-family: 'Bebas Neue', cursive; font-size: 50px; color: var(--accent); letter-spacing: 3px; line-height: 1; margin-bottom: 6px; }
.auth-sub { color: var(--muted); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 26px; width: 100%; max-width: 380px; }
.auth-card h2 { font-size: 17px; font-weight: 600; margin-bottom: 18px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: 600; }
.field input, .field select, .field textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 70px; }
.btn { width: 100%; padding: 13px; border-radius: 12px; border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s; }
.btn-primary { background: var(--accent); color: #ffffff; }
.btn-primary:active { opacity: 0.85; transform: scale(0.98); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); margin-top: 8px; font-weight: 500; }
.role-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
.role-tab { flex: 1; padding: 9px; border-radius: 9px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; text-align: center; }
.role-tab.active { background: var(--accent); color: #ffffff; border-color: var(--accent); }
.auth-switch { text-align: center; margin-top: 18px; font-size: 12px; color: var(--muted); }
.auth-switch span { color: var(--accent); cursor: pointer; font-weight: 600; }

/* ───────── Status bar mimic (phone chrome, mockup style) ───────── */
.statusbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px 0; font-size: 13px; font-weight: 600; color: var(--text); }
.statusbar .icons { display: flex; gap: 4px; align-items: center; font-size: 11px; color: var(--text); opacity: .85; }

/* ───────── Top header (mockup style: AT badge + name + score ring) ───────── */
.app-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; }
.app-header-left { display: flex; align-items: center; gap: 10px; }
.at-badge-logo { height: 34px; width: auto; flex-shrink: 0; object-fit: contain; }
.app-header-name { font-weight: 700; font-size: 15px; line-height: 1.2; }
.app-header-sub { font-size: 12px; color: var(--muted); }
.role-pill { font-size: 10px; padding: 3px 9px; border-radius: 20px; font-weight: 700; letter-spacing: .5px; color: #ffffff; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: #ffffff; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.header-right { display: flex; align-items: center; gap: 10px; }

/* ───────── Athlete selector (admin / parent) ───────── */
.athlete-select-bar { display: flex; gap: 8px; padding: 10px 20px; overflow-x: auto; scrollbar-width: none; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.athlete-select-bar::-webkit-scrollbar { display: none; }
.athlete-btn { flex-shrink: 0; display: flex; align-items: center; gap: 7px; padding: 7px 13px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; transition: all .15s; }
.athlete-btn.active { border-color: var(--accent2); background: rgba(11,83,148,0.08); }
.athlete-btn .av { width: 22px; height: 22px; border-radius: 50%; background: var(--accent2); color: #ffffff; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.athlete-btn span { font-size: 12px; font-weight: 600; color: var(--text); }

/* ───────── Profile menu ───────── */
.profile-menu { position: absolute; top: 64px; right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 8px; min-width: 180px; z-index: 200; display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.profile-menu.open { display: block; }
.profile-menu-item { padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background .15s; display: flex; align-items: center; gap: 10px; }
.profile-menu-item:hover { background: var(--surface2); }
.profile-menu-item.danger { color: var(--danger); }
.menu-divider { height: 1px; background: var(--border); margin: 4px 0; }

/* ───────── Content ───────── */
.content { flex: 1; padding: 16px 20px; padding-bottom: 100px; overflow-y: auto; }
.greeting { font-family: 'Bebas Neue', cursive; font-size: 26px; letter-spacing: 1px; margin-bottom: 2px; }
.greeting-date { font-size: 12px; color: var(--muted); margin-bottom: 18px; }

/* ───────── Score ring (dashboard) ───────── */
.score-ring-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.score-ring-wrap { position: relative; width: 78px; height: 78px; flex-shrink: 0; }
.score-ring-wrap svg { transform: rotate(-90deg); }
.score-ring-track { fill: none; stroke: var(--surface3); stroke-width: 7; }
.score-ring-fill { fill: none; stroke: var(--accent); stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset .6s ease; }
.score-ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-ring-pct { font-family: 'Bebas Neue', cursive; font-size: 19px; color: var(--text); line-height: 1; }
.score-ring-tag { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 1px; }

/* ───────── Section blocks ───────── */
.block { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 14px; }
.block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.block-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.block-link { font-size: 12px; color: var(--accent2); cursor: pointer; font-weight: 600; }

/* ───────── Checklist (priorities, morning routine) ───────── */
.check-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.check-row:last-child { border-bottom: none; }
.check-box { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--muted2); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.check-box.checked { background: var(--accent); border-color: var(--accent); }
.check-box.checked::after { content: '✓'; color: #ffffff; font-size: 11px; font-weight: 900; }
.check-label { flex: 1; font-size: 14px; }
.check-label.done { color: var(--muted2); text-decoration: line-through; }
.check-time { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

/* ───────── Stat tiles (3-col, mockup style: "Workouts 3/5") ───────── */
.tile-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 6px; }
.tile { background: var(--surface2); border-radius: 12px; padding: 10px 8px; text-align: left; }
.tile-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.tile-value { font-size: 17px; font-weight: 700; color: var(--accent); }

/* ───────── Upcoming card ───────── */
.upcoming-card { display: flex; align-items: center; gap: 12px; padding: 10px; background: var(--surface2); border-radius: 12px; }
.upcoming-icon { width: 36px; height: 36px; border-radius: 9px; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.upcoming-title { font-size: 13px; font-weight: 600; }
.upcoming-sub { font-size: 11px; color: var(--muted); }

/* ───────── Week strip (Today tab: S M T W T F S) ───────── */
.week-strip { display: flex; justify-content: space-between; margin-bottom: 16px; }
.week-strip-day { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
.week-strip-dow { font-size: 10px; color: var(--muted); font-weight: 600; }
.week-strip-num { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--text); transition: all .15s; }
.week-strip-num.today { background: var(--accent); color: #ffffff; font-weight: 800; }

/* ───────── Schedule timeline rows (Today + Schedule) ───────── */
.sched-row { display: flex; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.sched-row:last-child { border-bottom: none; }
.sched-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); min-width: 76px; flex-shrink: 0; padding-top: 1px; }
.sched-info-title { font-size: 13px; font-weight: 600; }
.sched-info-note { font-size: 11px; color: var(--muted); }

/* ───────── Task rows w/ checkbox circle ───────── */
.task-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
.task-num { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--muted2); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--muted); flex-shrink: 0; }
.task-num.done { background: var(--success); border-color: var(--success); color: #ffffff; }
.task-label { flex: 1; font-size: 13px; }
.task-label.done { color: var(--muted2); text-decoration: line-through; }

/* ───────── Skill bars (Performance) ───────── */
.skill-row { margin-bottom: 12px; }
.skill-row:last-child { margin-bottom: 0; }
.skill-label-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
.skill-label-row .v { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; }
.skill-bar { height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
.skill-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s ease; }

/* ───────── Generic progress (Goals) ───────── */
.progress-wrap { margin: 8px 0; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.progress-bar { height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s ease; }

/* ───────── Stat grid 4-col (Performance season stats) ───────── */
.stat-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.stat-grid-4 .g-box { text-align: center; }
.stat-grid-4 .g-val { font-family: 'Bebas Neue', cursive; font-size: 20px; color: var(--text); }
.stat-grid-4 .g-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

/* ───────── Nutrition rings row ───────── */
.nutri-rings { display: flex; justify-content: space-around; margin-bottom: 16px; }
.nutri-ring-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.nutri-ring-wrap { position: relative; width: 64px; height: 64px; }
.nutri-ring-wrap svg { transform: rotate(-90deg); }
.nutri-ring-track { fill: none; stroke: var(--surface3); stroke-width: 6; }
.nutri-ring-fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset .6s ease; }
.nutri-ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.nutri-ring-val { font-size: 12px; font-weight: 700; line-height: 1; }
.nutri-ring-name { font-size: 10px; color: var(--muted); margin-top: 5px; font-weight: 600; }

/* ───────── Meal rows ───────── */
.meal-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.meal-row:last-child { border-bottom: none; }
.meal-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.meal-name { font-size: 13px; font-weight: 600; }
.meal-detail { font-size: 11px; color: var(--muted); }
.meal-cal { font-size: 12px; color: var(--muted); font-weight: 600; margin-left: auto; }

/* ───────── Class rows (school) ───────── */
.class-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); }
.class-row:last-child { border-bottom: none; }
.class-name { font-size: 13px; font-weight: 500; }
.class-grade { font-size: 13px; font-weight: 700; color: var(--accent); }

/* ───────── Assignment rows ───────── */
.assign-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.assign-row:last-child { border-bottom: none; }
.assign-title { flex: 1; font-size: 13px; }
.assign-due { font-size: 11px; color: var(--accent3); font-weight: 600; }

/* ───────── Reflection cards ───────── */
.reflect-card { display: flex; gap: 12px; padding: 14px; background: var(--surface2); border-radius: 12px; margin-bottom: 10px; }
.reflect-card:last-child { margin-bottom: 0; }
.reflect-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.reflect-q { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 3px; }
.reflect-a { font-size: 13px; line-height: 1.5; }
.reflect-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.reflect-nav-arrow { width: 30px; height: 30px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; }
.reflect-nav-label { font-size: 13px; font-weight: 600; }

/* ───────── Sparkline (nutrition weekly weight) ───────── */
.spark-row { display: flex; align-items: flex-end; gap: 6px; height: 60px; margin-top: 10px; }
.spark-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.spark-bar-wrap { width: 100%; height: 44px; display: flex; align-items: flex-end; }
.spark-bar { width: 100%; background: var(--accent); border-radius: 3px 3px 0 0; opacity: 0.85; }
.spark-dow { font-size: 9px; color: var(--muted); }

/* ───────── Tags / badges ───────── */
.tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-right: 6px; margin-bottom: 4px; }
.tag-green { background: rgba(31,170,110,0.12); color: var(--success); }
.tag-blue { background: rgba(11,83,148,0.10); color: var(--accent2); }
.tag-orange { background: rgba(245,137,14,0.12); color: var(--accent3); }
.tag-yellow { background: rgba(245,137,14,0.12); color: var(--accent); }

/* ───────── Cards (entries: workouts/games/etc) ───────── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.card-title { font-weight: 600; font-size: 15px; }
.card-meta { font-size: 12px; color: var(--muted); }
.card-body { font-size: 14px; color: var(--muted); line-height: 1.6; }
.card-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn-small { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.btn-small.del { color: var(--danger); border-color: var(--danger); }
.btn-add { background: var(--accent); color: #ffffff; border: none; border-radius: 10px; padding: 7px 14px; font-weight: 700; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

/* ───────── Empty state ───────── */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.empty h3 { font-size: 15px; font-weight: 600; margin-bottom: 5px; color: var(--text); }
.empty p { font-size: 12px; }

/* ───────── Bottom nav (mockup style: 6 icons + labels) ───────── */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 8px 4px 10px; z-index: 60; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; color: var(--muted2); transition: color .15s; }
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 17px; line-height: 1; }
.nav-label { font-size: 9px; font-weight: 600; letter-spacing: .2px; }

/* ───────── Modal ───────── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.drawer { background: var(--surface); border-radius: 22px 22px 0 0; padding: 22px 20px 36px; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; animation: slideUp .25s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.drawer-handle { width: 38px; height: 4px; background: var(--surface3); border-radius: 2px; margin: 0 auto 18px; }
.drawer-title { font-family: 'Bebas Neue', cursive; font-size: 24px; letter-spacing: 1.5px; margin-bottom: 18px; }

/* ───────── Toast ───────── */
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #ffffff; padding: 11px 22px; border-radius: 30px; font-weight: 700; font-size: 13px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* ───────── Light-theme depth (cards need shadow since bg is also light) ───────── */
.block, .card, .auth-card, .upcoming-card, .reflect-card { box-shadow: 0 1px 3px rgba(16,38,68,0.06), 0 1px 2px rgba(16,38,68,0.04); }
.bottom-nav { box-shadow: 0 -2px 8px rgba(16,38,68,0.05); }
.profile-menu { box-shadow: 0 8px 28px rgba(16,38,68,0.18) !important; }
.tile, .meal-icon, .upcoming-icon, .reflect-icon, .at-badge { box-shadow: none; }

.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">

    <div class="menu-divider"></div>
    <div class="profile-menu-item danger" onclick="logout()">⏻ Sign Out</div>
  </div>

  <div id="athlete-select-bar" class="athlete-select-bar hidden"></div>

  <div class="content" id="content"></div>

  <div class="bottom-nav">
    <div class="nav-item active" id="nav_dashboard" onclick="switchTab('dashboard')"><span class="nav-icon">⌂</span><span class="nav-label">Dashboard</span></div>
    <div class="nav-item" id="nav_today" onclick="switchTab('today')"><span class="nav-icon">📋</span><span class="nav-label">Today</span></div>

    <div class="nav-item" id="nav_goals" onclick="switchTab('goals')"><span class="nav-icon">📈</span><span class="nav-label">Goals</span></div>

</div>

</div>

  <div class="drawer"><div class="drawer-handle"></div><div id="modal-content"></div></div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
// ═══════════════════════════════ FIREBASE SETUP ═══════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDei4izfhywYp_oxjFrUGBfPREUnNioM1s",
  authDomain: "adptracker-d0e45.firebaseapp.com",
  databaseURL: "https://adptracker-d0e45-default-rtdb.firebaseio.com",
  projectId: "adptracker-d0e45",
  storageBucket: "adptracker-d0e45.firebasestorage.app",
  messagingSenderId: "743130182241",
  appId: "1:743130182241:web:16acc72b7bd44edc257020"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

async function fbGet(path) { const snap = await get(ref(db, path)); return snap.exists() ? snap.val() : null; }
async function fbSet(path, val) { await set(ref(db, path), val); }
async function fbUpdate(path, val) { await update(ref(db, path), val); }
async function fbRemove(path) { await remove(ref(db, path)); }

// ═══════════════════════════════ STATE ═══════════════════════════════
let currentUser = null;
let currentRole = 'athlete';
let activeTab = 'dashboard';
let activeWeek = getCurrentWeek();
let activeDayIdx = new Date().getDay(); // 0=Sun..6=Sat
let viewingAthleteId = null;
let allUsers = {};

const DOW_LABELS = ['S','M','T','W','T','F','S'];
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// ═══════════════════════════════ INIT ═══════════════════════════════
async function initDefaults() {
  const users = await fbGet('users');
  if (!users || !users['admin']) await fbSet('users/admin', { id:'admin', username:'admin', pin:'0000', name:'Admin', role:'admin', sport:'', position:'' });
  if (!users || !users['parent1']) await fbSet('users/parent1', { id:'parent1', username:'parent', pin:'1111', name:'Parent', role:'parent', sport:'', position:'' });
  allUsers = (await fbGet('users')) || {};
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
}

// ═══════════════════════════════ AUTH ═══════════════════════════════
function setRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach((t,i) => t.classList.toggle('active', ['athlete','parent','admin'][i] === role));
  document.getElementById('auth-switch-link').style.display = role === 'athlete' ? 'block' : 'none';
  document.getElementById('login-title').textContent = role === 'admin' ? 'Admin Sign In' : role === 'parent' ? 'Parent Sign In' : 'Athlete Sign In';
}
window.setRole = setRole;

async function login() {
  const username = document.getElementById('login-username').value.trim();
  const pin = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  allUsers = (await fbGet('users')) || {};
  const user = Object.values(allUsers).find(u => u.username.toLowerCase() === username.toLowerCase() && u.pin === pin);
  if (!user) { errEl.textContent = 'Invalid username or PIN'; errEl.style.display = 'block'; return; }
  if (currentRole === 'parent' && user.role !== 'parent') { errEl.textContent = 'Not a parent account'; errEl.style.display = 'block'; return; }
  if (currentRole === 'admin' && user.role !== 'admin') { errEl.textContent = 'Not an admin account'; errEl.style.display = 'block'; return; }
  if (currentRole === 'athlete' && user.role !== 'athlete') { errEl.textContent = 'Not an athlete account'; errEl.style.display = 'block'; return; }
  currentUser = user;
  enterApp();
}
window.login = login;

async function registerAthlete() {
  const name = document.getElementById('reg-name').value.trim();
  const username = document.getElementById('reg-username').value.trim();
  const pin = document.getElementById('reg-pin').value.trim();
  const sport = document.getElementById('reg-sport').value.trim();
  const position = document.getElementById('reg-position').value.trim();
  if (!name || !username || !pin) { showToast('Fill in all required fields'); return; }
  if (pin.length !== 4) { showToast('PIN must be 4 digits'); return; }
  allUsers = (await fbGet('users')) || {};
  if (Object.values(allUsers).find(u => u.username.toLowerCase() === username.toLowerCase())) { showToast('Username already taken'); return; }
  const id = 'athlete_' + Date.now();
  const newUser = { id, username, pin, name, role: 'athlete', sport, position };
  await fbSet('users/' + id, newUser);
  allUsers[id] = newUser;
  showToast('Athlete account created!');
  showLogin();
  ['reg-name','reg-username','reg-pin','reg-sport','reg-position'].forEach(i => document.getElementById(i).value = '');
}
window.registerAthlete = registerAthlete;

function logout() {
  currentUser = null; viewingAthleteId = null; activeTab = 'dashboard';
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('main-screen').classList.add('hidden');
  document.getElementById('login-username').value = '';
  document.getElementById('login-pin').value = '';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('profile-menu').classList.remove('open');
}
window.logout = logout;

function showLogin() {
  document.getElementById('login-form').classList.remove('hidden');
  document.getElementById('register-form').classList.add('hidden');
  document.getElementById('auth-switch-link').style.display = 'block';
}
window.showLogin = showLogin;

function showRegister() {
  document.getElementById('login-form').classList.add('hidden');
  document.getElementById('register-form').classList.remove('hidden');
  document.getElementById('auth-switch-link').style.display = 'none';
}
window.showRegister = showRegister;

function enterApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  const badge = document.getElementById('role-badge');
  const bar = document.getElementById('athlete-select-bar');

  if (currentUser.role === 'admin') {
    badge.textContent = 'ADMIN'; badge.style.background = 'var(--navy)'; badge.classList.remove('hidden');
    bar.classList.remove('hidden'); buildAthleteSelector();
    const athletes = Object.values(allUsers).filter(u => u.role === 'athlete');
    if (athletes.length) { viewingAthleteId = athletes[0].id; setHeader(athletes[0]); }
    document.getElementById('user-avatar').textContent = 'A';
    document.getElementById('menu-admin-panel').classList.remove('hidden');
    document.getElementById('menu-change-pin').classList.add('hidden');
  } else if (currentUser.role === 'parent') {
    badge.textContent = 'PARENT VIEW'; badge.style.background = 'var(--accent3)'; badge.classList.remove('hidden');
    bar.classList.remove('hidden'); buildAthleteSelector();
    const athletes = Object.values(allUsers).filter(u => u.role === 'athlete');
    if (athletes.length) { viewingAthleteId = athletes[0].id; setHeader(athletes[0]); }
    document.getElementById('user-avatar').textContent = currentUser.name[0].toUpperCase();
    document.getElementById('menu-admin-panel').classList.add('hidden');
    document.getElementById('menu-change-pin').classList.remove('hidden');
  } else {
    badge.classList.add('hidden'); bar.classList.add('hidden');
    viewingAthleteId = currentUser.id;
    setHeader(currentUser);
    document.getElementById('user-avatar').textContent = currentUser.name[0].toUpperCase();
    document.getElementById('menu-admin-panel').classList.add('hidden');
    document.getElementById('menu-change-pin').classList.remove('hidden');
  }
  document.getElementById('menu-name').textContent = currentUser.name;
  document.getElementById('menu-role').textContent = currentUser.role.charAt(0).toUpperCase() + currentUser.role.slice(1);
  switchTab('dashboard');
}

function setHeader(u) {
  document.getElementById('header-name').textContent = u.name;
  document.getElementById('header-sub').textContent = [u.sport, u.position].filter(Boolean).join(' · ') || 'Athlete';
}

function buildAthleteSelector() {
  const bar = document.getElementById('athlete-select-bar');
  const athletes = Object.values(allUsers).filter(u => u.role === 'athlete');
  if (!athletes.length) { bar.innerHTML = '<span style="color:var(--muted);font-size:13px;padding:8px;">No athletes yet</span>'; return; }
  bar.innerHTML = athletes.map((a,i) => `<div class="athlete-btn ${i===0?'active':''}" id="abtn_${a.id}" onclick="selectAthlete('${a.id}')"><div class="av">${a.name[0]}</div><span>${a.name}</span></div>`).join('');
}

function selectAthlete(id) {
  viewingAthleteId = id;
  document.querySelectorAll('.athlete-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('abtn_' + id)?.classList.add('active');
  const a = Object.values(allUsers).find(u => u.id === id);
  if (a) setHeader(a);
  renderTab(activeTab);
}
window.selectAthlete = selectAthlete;

// ═══════════════════════════════ WEEK HELPERS ═══════════════════════════════
function getCurrentWeek() {
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  const day = d.getUTCDay() || 7; d.setUTCDate(d.getUTCDate() + 4 - day);
  const y = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return `${d.getUTCFullYear()}-W${String(Math.ceil((((d-y)/86400000)+1)/7)).padStart(2,'0')}`;
}

function getWeekDates() {
  // returns array of 7 Date objects for the current real week, Sun-Sat
  const now = new Date();
  const sunday = new Date(now);
  sunday.setDate(now.getDate() - now.getDay());
  const dates = [];
  for (let i=0;i<7;i++) { const d = new Date(sunday); d.setDate(sunday.getDate()+i); dates.push(d); }
  return dates;
}

// ═══════════════════════════════ TABS ═══════════════════════════════
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav_' + tab)?.classList.add('active');
  renderTab(tab);
}
window.switchTab = switchTab;

async function renderTab(tab) {
  const c = document.getElementById('content');
  const uid = viewingAthleteId;
  const ro = currentUser.role === 'parent';
  if (!uid) { c.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><h3>No athletes yet</h3><p>Create accounts via Admin</p></div>`; return; }
  c.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);">Loading...</div>`;
  if (tab==='dashboard') await renderDashboard(uid,c,ro);
  else if (tab==='today') await renderToday(uid,c,ro);
  else if (tab==='performance') await renderPerformance(uid,c,ro);
  else if (tab==='school') await renderSchool(uid,c,ro);
  else if (tab==='nutrition') await renderNutrition(uid,c,ro);
  else if (tab==='goals') await renderGoals(uid,c,ro);
  else if (tab==='reflection') await renderReflection(uid,c,ro);
}

// ═══════════════════════════════ RING HELPER ═══════════════════════════════
function ringSvg(pct, size, stroke, color) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (pct/100) * c;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle class="score-ring-track" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}"></circle>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${stroke}" fill="none" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset .6s ease;"></circle>
  </svg>`;
}

// ═══════════════════════════════ DASHBOARD ═══════════════════════════════
async function renderDashboard(uid,c,ro) {
  const u = Object.values(allUsers).find(x=>x.id===uid) || {};
  const [workouts, schedule, goals, todos] = await Promise.all([
    fbGet(`data/${uid}/workouts/${activeWeek}`),
    fbGet(`data/${uid}/schedule/${activeWeek}`),
    fbGet(`data/${uid}/goals`),
    fbGet(`data/${uid}/todos/${todayKey()}`)
  ]);
  const wArr = workouts ? Object.values(workouts) : [];
  const goArr = goals ? Object.values(goals) : [];
  const sArr = schedule ? Object.entries(schedule) : [];
  const todoArr = todos ? Object.entries(todos) : [];
  const doneTodos = todoArr.filter(([,t])=>t.done).length;
  const doneGoals = goArr.filter(g=>g.done).length;

  // Today score = average of (todos done %, goals progress avg)
  const todoPct = todoArr.length ? Math.round(doneTodos/todoArr.length*100) : 0;
  const goalPct = goArr.length ? Math.round(goArr.reduce((s,g)=>s+(g.progress||0),0)/goArr.length) : 0;
  const score = todoArr.length || goArr.length ? Math.round((todoPct + goalPct) / (goArr.length && todoArr.length ? 2 : 1)) : 0;

  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});

  // upcoming: next schedule item today or this week
  const upcoming = sArr.map(([k,s])=>s).slice(0,1)[0];

  c.innerHTML = `
    <div class="greeting">Welcome back,<br>${u.name ? u.name.split(' ')[0] : 'Athlete'}!</div>
    <div class="greeting-date">Today is ${dateStr}</div>

    <div class="score-ring-row">
      <div class="block" style="flex:1;margin:0;margin-right:12px;">
        <div class="block-title" style="margin-bottom:8px;">Today's Priorities</div>
        ${todoArr.length ? todoArr.slice(0,4).map(([k,t]) => `
          <div class="check-row">
            <div class="check-box ${t.done?'checked':''}" onclick="toggleTodo('${uid}','${k}')"></div>
            <div class="check-label ${t.done?'done':''}">${t.label}</div>
            ${t.time?`<div class="check-time">${t.time}</div>`:''}
          </div>`).join('') : `<div style="font-size:12px;color:var(--muted);padding:6px 0;">No priorities set ${ro?'':'— add some on Today tab'}</div>`}
      </div>
      <div class="score-ring-wrap" style="flex-shrink:0;">
        ${ringSvg(score, 78, 7, 'var(--accent)')}
        <div class="score-ring-label">
          <div class="score-ring-pct">${score}%</div>
          <div class="score-ring-tag">Today</div>
        </div>
      </div>
    </div>

    <div class="block">
      <div class="block-title" style="margin-bottom:10px;">This Week</div>
      <div class="tile-row">
        <div class="tile"><div class="tile-label">Workouts</div><div class="tile-value">${wArr.length}/5</div></div>
        <div class="tile"><div class="tile-label">Goals</div><div class="tile-value">${doneGoals}/${goArr.length||0}</div></div>
        <div class="tile"><div class="tile-label">Sched.</div><div class="tile-value">${sArr.length}</div></div>
      </div>
    </div>

    ${upcoming ? `
    <div class="block">
      <div class="block-header"><div class="block-title">Upcoming</div><div class="block-link" onclick="switchTab('today')">View all ›</div></div>
      <div class="upcoming-card">
        <div class="upcoming-icon">📅</div>
        <div>
          <div class="upcoming-title">${upcoming.event}</div>
          <div class="upcoming-sub">${upcoming.day} · ${upcoming.time}</div>
        </div>
      </div>
    </div>` : ''}

    ${!wArr.length && !goArr.length && !sArr.length && !todoArr.length ? `<div class="empty"><div class="empty-icon">🏅</div><h3>Nothing logged yet</h3><p>Start on the Today tab</p></div>` : ''}
  `;
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function toggleTodo(uid, key) {
  const todos = await fbGet(`data/${uid}/todos/${todayKey()}`) || {};
  if (todos[key]) {
    await fbUpdate(`data/${uid}/todos/${todayKey()}/${key}`, { done: !todos[key].done });
    renderTab(activeTab);
  }
}
window.toggleTodo = toggleTodo;

// ═══════════════════════════════ TODAY ═══════════════════════════════
async function renderToday(uid,c,ro) {
  const dates = getWeekDates();
  const realToday = new Date();
  const dayKeyForIdx = (idx) => { const d = dates[idx]; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
  const selectedDayKey = dayKeyForIdx(activeDayIdx);
  const selectedDate = dates[activeDayIdx];
  const isToday = selectedDate.toDateString() === realToday.toDateString();

  const [todos, schedule] = await Promise.all([
    fbGet(`data/${uid}/todos/${selectedDayKey}`),
    fbGet(`data/${uid}/schedule/${activeWeek}`)
  ]);
  const todoArr = todos ? Object.entries(todos) : [];
  const dayName = DAY_NAMES[activeDayIdx];
  const schedArr = schedule ? Object.entries(schedule).filter(([k,s]) => s.day === dayName) : [];

  c.innerHTML = `
    <div class="greeting">Today</div>
    <div class="greeting-date">${selectedDate.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>

    <div class="week-strip">
      ${DOW_LABELS.map((label,i) => `
        <div class="week-strip-day" onclick="selectDay(${i})">
          <div class="week-strip-dow">${label}</div>
          <div class="week-strip-num ${i===activeDayIdx?'today':''}">${dates[i].getDate()}</div>
        </div>`).join('')}
    </div>

    <div class="block">
      <div class="block-header"><div class="block-title">Schedule</div></div>
      ${schedArr.length ? schedArr.sort((a,b)=>a[1].time.localeCompare(b[1].time)).map(([k,s]) => `
        <div class="sched-row">
          <div class="sched-time">${s.time}</div>
          <div><div class="sched-info-title">${s.event}</div>${s.note?`<div class="sched-info-note">${s.note}</div>`:''}</div>
        </div>`).join('') : `<div style="font-size:12px;color:var(--muted);padding:6px 0;">Nothing scheduled for ${dayName}</div>`}
      ${!ro ? `<button class="btn-add" style="margin-top:10px;" onclick="openModal('schedule')">+ Add to Schedule</button>` : ''}
    </div>

    <div class="block">
      <div class="block-header"><div class="block-title">Top Tasks</div>${!ro?`<div class="block-link" onclick="openModal('todo')">+ Add</div>`:''}</div>
      ${todoArr.length ? todoArr.map(([k,t],i) => `
        <div class="task-row">
          <div class="task-num ${t.done?'done':''}" onclick="toggleTodoDay('${uid}','${selectedDayKey}','${k}')">${t.done?'✓':i+1}</div>
          <div class="task-label ${t.done?'done':''}">${t.label}</div>
          ${!ro?`<button class="btn-small del" style="padding:3px 8px;" onclick="deleteTodo('${uid}','${selectedDayKey}','${k}')">✕</button>`:''}
        </div>`).join('') : `<div class="empty"><div class="empty-icon">✅</div><h3>No tasks yet</h3><p>${ro?'Nothing added':'Add your top priorities for the day'}</p></div>`}
    </div>
  `;
}

function selectDay(idx) { activeDayIdx = idx; renderTab('today'); }
window.selectDay = selectDay;

async function toggleTodoDay(uid, dayKey, key) {
  const todos = await fbGet(`data/${uid}/todos/${dayKey}`) || {};
  if (todos[key]) { await fbUpdate(`data/${uid}/todos/${dayKey}/${key}`, { done: !todos[key].done }); renderTab('today'); }
}
window.toggleTodoDay = toggleTodoDay;

async function deleteTodo(uid, dayKey, key) {
  if (!confirm('Remove this task?')) return;
  await fbRemove(`data/${uid}/todos/${dayKey}/${key}`);
  renderTab('today');
}
window.deleteTodo = deleteTodo;

// ═══════════════════════════════ PERFORMANCE ═══════════════════════════════
async function renderPerformance(uid,c,ro) {
  const [physical, skills, workouts, games] = await Promise.all([
    fbGet(`data/${uid}/physical`),
    fbGet(`data/${uid}/skills`),
    fbGet(`data/${uid}/workouts/${activeWeek}`),
    fbGet(`data/${uid}/games`)
  ]);
  const p = physical || {};
  const sk = skills ? Object.entries(skills) : [];
  const wArr = workouts ? Object.values(workouts) : [];
  const allGames = games ? Object.values(games).flatMap(wk => Object.values(wk)) : [];

  // season aggregate stats from games stats field "12 pts, 5 reb, 3 ast" type entries -> just count games + wins
  const wins = allGames.filter(g=>g.result==='Win').length;
  const totalGames = allGames.length;

  c.innerHTML = `
    <div class="greeting">Performance</div>
    <div class="greeting-date">&nbsp;</div>

    <div class="block">
      <div class="block-header"><div class="block-title">Physical Stats</div>${!ro?`<div class="block-link" onclick="openModal('physical')">Edit</div>`:''}</div>
      <div class="stat-grid-4">
        <div class="g-box"><div class="g-val">${p.weight||'—'}</div><div class="g-lbl">Weight</div></div>
        <div class="g-box"><div class="g-val">${p.height||'—'}</div><div class="g-lbl">Height</div></div>
        <div class="g-box"><div class="g-val">${p.bodyfat||'—'}</div><div class="g-lbl">Body Fat</div></div>
        <div class="g-box"><div class="g-val">${p.restingHr||'—'}</div><div class="g-lbl">Resting HR</div></div>
      </div>
    </div>

    <div class="block">
      <div class="block-header"><div class="block-title">Skills Tracker</div>${!ro?`<div class="block-link" onclick="openModal('skill')">+ Add</div>`:''}</div>
      ${sk.length ? sk.map(([k,s]) => `
        <div class="skill-row">

  `;
}
function mealIcon(meal) {
  const m = (meal||'').toLowerCase();
  if (m.includes('breakfast')) return '🍳';
  if (m.includes('lunch')) return '🥪';
  if (m.includes('dinner')) return '🍽️';
  if (m.includes('pre')) return '⚡';
  if (m.includes('post')) return '🥤';
  return '🍎';
}

  { key:'learned', q:'What did I learn?', icon:'💡' },

async function renderReflection(uid,c,ro) {
  const data = await fbGet(`data/${uid}/reflection/${activeWeek}`) || {};
  const weekLabel = getWeekRangeLabel();

  c.innerHTML = `
    <div class="greeting">Reflection</div>
    <div class="greeting-date">&nbsp;</div>
    <div class="reflect-nav">
      <div class="reflect-nav-arrow" onclick="shiftReflectionWeek(-1)">‹</div>
      <div class="reflect-nav-label">${weekLabel}</div>
      <div class="reflect-nav-arrow" onclick="shiftReflectionWeek(1)">›</div>
    </div>
    ${REFLECTION_PROMPTS.map(p => `
      <div class="reflect-card" ${!ro?`onclick="openReflectionEdit('${uid}','${p.key}','${p.q.replace(/'/g,"\\'")}')"`:''} style="${!ro?'cursor:pointer;':''}">
        <div class="reflect-icon">${p.icon}</div>
        <div style="flex:1;">
          <div class="reflect-q">${p.q}</div>
          <div class="reflect-a">${data[p.key] || (ro ? 'No response yet' : 'Tap to answer...')}</div>
        </div>
      </div>`).join('')}
  `;
}

function getWeekRangeLabel() {
  const [year, week] = activeWeek.split('-W');
  const jan1 = new Date(parseInt(year), 0, 1);
  const off = (jan1.getDay() <= 4 ? 1 - jan1.getDay() : 8 - jan1.getDay());
  const start = new Date(jan1); start.setDate(jan1.getDate() + off + (parseInt(week)-1)*7);
  const end = new Date(start); end.setDate(start.getDate()+6);
  const fmt = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${fmt(start)} – ${fmt(end)}`;
}

function shiftReflectionWeek(dir) {
  const [y,w] = activeWeek.split('-W');
  let wn = parseInt(w)+dir, yn = parseInt(y);
  if (wn<1){yn--;wn=52+wn;} if(wn>52){yn++;wn=wn-52;}
  activeWeek = `${yn}-W${String(wn).padStart(2,'0')}`;
  renderTab('reflection');
}
window.shiftReflectionWeek = shiftReflectionWeek;

function openReflectionEdit(uid, key, question) {
  fbGet(`data/${uid}/reflection/${activeWeek}`).then(data => {

    mc.innerHTML = `<div class="drawer-title">Reflect</div>
      <div class="field"><label>${question}</label><textarea id="f-reflection" style="min-height:120px;" placeholder="Write your thoughts...">${current}</textarea></div>

}

    renderTab('performance');
  } else if (type==='game') {
    await fbSet(`data/${uid}/games/${activeWeek}/${key}`, { opponent: val('f-opponent')||'Unknown', date: val('f-date'), result: val('f-result'), score: val('f-score'), stats: val('f-stats') });
    renderTab('performance');
  } else if (type==='schedule') {
    const t = val('f-time');
    const fmtTime = t ? new Date('1970-01-01T'+t).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
    await fbSet(`data/${uid}/schedule/${activeWeek}/${key}`, { day: val('f-day'), time: fmtTime, event: val('f-event')||'Event', note: val('f-note') });
    renderTab(activeTab==='dashboard'?'dashboard':'today');
  } else if (type==='todo') {
    const dayKey = activeTab==='today' ? (() => { const d = getWeekDates()[activeDayIdx]; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })() : todayKey();
    await fbSet(`data/${uid}/todos/${dayKey}/${key}`, { label: val('f-label')||'Task', done: false });
    renderTab('today');
  } else if (type==='goal') {
    await fbSet(`data/${uid}/goals/${key}`, { title: val('f-title')||'Goal', category: val('f-category'), target: val('f-target'), progress: parseInt(val('f-progress'))||0, notes: '', done: false });
    renderTab('goals');
  } else if (type==='nutrition') {
    await fbSet(`data/${uid}/nutrition/${activeWeek}/${key}`, { date: val('f-date'), meal: val('f-meal'), foods: val('f-foods'), calories: val('f-calories'), protein: val('f-protein'), water: val('f-water') });
    renderTab('nutrition');
  } else if (type==='physical') {
    await fbUpdate(`data/${uid}/physical`, { weight: val('f-weight'), height: val('f-height'), bodyfat: val('f-bodyfat'), restingHr: val('f-restingHr') });
    renderTab('performance');
  } else if (type==='skill') {
    await fbSet(`data/${uid}/skills/${key}`, { name: val('f-name')||'Skill', value: parseInt(val('f-value'))||0 });
    renderTab('performance');
  } else if (type==='academic') {
    await fbUpdate(`data/${uid}/academic`, { gpa: val('f-gpa'), studyHours: val('f-studyHours'), studyGoal: val('f-studyGoal') });
    renderTab('school');
  } else if (type==='class') {
    await fbSet(`data/${uid}/classes/${key}`, { name: val('f-name')||'Class', grade: val('f-grade')||'—' });
    renderTab('school');
  } else if (type==='assignment') {
    await fbSet(`data/${uid}/assignments/${key}`, { title: val('f-title')||'Assignment', due: val('f-due'), done: false });
    renderTab('school');
  }
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('Saved!');
}
window.saveEntry = saveEntry;

function closeModal(e) { if (e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('open'); }
window.closeModal = closeModal;

// ═══════════════════════════════ PIN MANAGEMENT ═══════════════════════════════
function openChangePinModal() {
  document.getElementById('profile-menu').classList.remove('open');
  document.getElementById('modal-content').innerHTML = `<div class="drawer-title">Change PIN</div><div class="field"><label>Current PIN</label><input type="password" id="cp-current" maxlength="4" inputmode="numeric"></div><div class="field"><label>New PIN</label><input type="password" id="cp-new" maxlength="4" inputmode="numeric"></div><div class="field"><label>Confirm New PIN</label><input type="password" id="cp-confirm" maxlength="4" inputmode="numeric"></div><div id="cp-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;"></div><button class="btn btn-primary" onclick="saveNewPin()">Update PIN</button>`;
  document.getElementById('modal-overlay').classList.add('open');
}
window.openChangePinModal = openChangePinModal;

async function saveNewPin() {
  const current=document.getElementById('cp-current').value, newPin=document.getElementById('cp-new').value, confirm=document.getElementById('cp-confirm').value;
  const errEl=document.getElementById('cp-error'); errEl.style.display='none';
  if (current!==currentUser.pin){errEl.textContent='Current PIN is incorrect';errEl.style.display='block';return;}
  if (!/^\d{4}$/.test(newPin)){errEl.textContent='New PIN must be 4 digits';errEl.style.display='block';return;}
  if (newPin!==confirm){errEl.textContent='PINs do not match';errEl.style.display='block';return;}
  await fbUpdate('users/'+currentUser.id, {pin: newPin});
  currentUser.pin=newPin;
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('PIN updated!');
}
window.saveNewPin = saveNewPin;

async function openAdminPanelModal() {
  document.getElementById('profile-menu').classList.remove('open');
  allUsers = (await fbGet('users')) || {};
  const athletes = Object.values(allUsers).filter(u=>u.role==='athlete');
  document.getElementById('modal-content').innerHTML = `<div class="drawer-title">Admin Panel</div>
  <div class="block-title" style="margin-bottom:14px;">Reset Athlete PIN</div>
  ${!athletes.length ? `<div class="empty"><div class="empty-icon">👤</div><h3>No athletes yet</h3></div>` : `
    <div class="field"><label>Select Athlete</label><select id="ap-athlete" onchange="revealPin()">${athletes.map(a=>`<option value="${a.id}">${a.name} (@${a.username})</option>`).join('')}</select></div>
    <div class="field"><label>Current PIN (tap to reveal)</label><div id="ap-current-pin" onclick="revealPin()" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;font-family:'DM Mono',monospace;color:var(--accent3);">Tap to reveal</div></div>
    <div class="field"><label>New PIN</label><input type="password" id="ap-new-pin" maxlength="4" inputmode="numeric"></div>
    <div class="field"><label>Confirm New PIN</label><input type="password" id="ap-confirm-pin" maxlength="4" inputmode="numeric"></div>
    <div id="ap-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;"></div>
    <button class="btn btn-primary" onclick="adminResetPin()">Reset PIN</button>
  `}
  <div class="menu-divider" style="margin:20px 0;"></div>
  <div class="block-title" style="margin-bottom:14px;">Admin PIN</div>
  <div class="field"><label>New Admin PIN</label><input type="password" id="ap-admin-pin" maxlength="4" inputmode="numeric"></div>
  <div id="ap-admin-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;"></div>
  <button class="btn btn-ghost" onclick="adminChangeOwnPin()">Change Admin PIN</button>`;
  document.getElementById('modal-overlay').classList.add('open');
}
window.openAdminPanelModal = openAdminPanelModal;

function revealPin() {
  const id = document.getElementById('ap-athlete').value;
  const u = Object.values(allUsers).find(u=>u.id===id);
  if (u) document.getElementById('ap-current-pin').textContent = u.pin;
}
window.revealPin = revealPin;

async function adminResetPin() {
  const id=document.getElementById('ap-athlete').value, newPin=document.getElementById('ap-new-pin').value, confirm=document.getElementById('ap-confirm-pin').value;
  const errEl=document.getElementById('ap-error'); errEl.style.display='none';
  if(!/^\d{4}$/.test(newPin)){errEl.textContent='PIN must be 4 digits';errEl.style.display='block';return;}
  if(newPin!==confirm){errEl.textContent='PINs do not match';errEl.style.display='block';return;}
  await fbUpdate('users/'+id, {pin: newPin});
  allUsers[id].pin=newPin;
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('PIN reset!');
}
window.adminResetPin = adminResetPin;

async function adminChangeOwnPin() {
  const newPin=document.getElementById('ap-admin-pin').value;
  const errEl=document.getElementById('ap-admin-error'); errEl.style.display='none';
  if(!/^\d{4}$/.test(newPin)){errEl.textContent='PIN must be 4 digits';errEl.style.display='block';return;}
  await fbUpdate('users/'+currentUser.id, {pin: newPin});
  currentUser.pin=newPin;
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('Admin PIN updated!');
}
window.adminChangeOwnPin = adminChangeOwnPin;

// ═══════════════════════════════ PROFILE MENU / TOAST ═══════════════════════════════
function toggleProfileMenu() { document.getElementById('profile-menu').classList.toggle('open'); }
window.toggleProfileMenu = toggleProfileMenu;
document.addEventListener('click', e => {
  const menu=document.getElementById('profile-menu'), av=document.getElementById('user-avatar');
  if (menu.classList.contains('open')&&!menu.contains(e.target)&&!av.contains(e.target)) menu.classList.remove('open');
});

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
window.showToast = showToast;

// ═══════════════════════════════ BOOT ═══════════════════════════════
initDefaults();

</script>
</body>
</html>
